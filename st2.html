<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Stock News AI Analyzer</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        input {
            padding: 6px;
            margin-right: 10px;
        }

        button {
            padding: 8px 16px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
        }

        .buy {
            color: green;
            font-weight: bold;
        }

        .sell {
            color: red;
            font-weight: bold;
        }

        .hold {
            color: orange;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Stock News Analyzer</h2>

    <label>Date:</label>
    <input type="date" id="date">

    <label>Page:</label>
    <input type="number" id="page" value="1">

    <label>Limit:</label>
    <input type="number" id="limit" value="5">

    <button onclick="loadNews()">Analyze</button>

    <table>
        <thead>
            <tr>
                <th>Headline</th>
                <th>Sentiment</th>
                <th>Signal</th>
            </tr>
        </thead>

        <tbody id="tableBody"></tbody>
    </table>

    <script>

        const HF_TOKEN = process.env.HF_TOKEN;

        async function loadNews() {

            const date = document.getElementById("date").value
            const page = document.getElementById("page").value
            const limit = document.getElementById("limit").value

            document.getElementById("tableBody").innerHTML = "Loading..."

            const res = await fetch(
                "https://app1.whalesbook1.shop/published-news-collection/v2/free",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        date: date,
                        page: Number(page),
                        limit: Number(limit),
                        sector: "All",
                        language: "English"
                    })
                })

            const json = await res.json()

            document.getElementById("tableBody").innerHTML = ""

            for (const item of json.data) {

                let text = item.headline + " " + item.shortDescription

                let sentiment = await getSentiment(text)

                let signal = convertSignal(sentiment)

                addRow(item.headline, sentiment, signal)

            }

        }

        async function getSentiment(text) {

            const response = await fetch(
                "https://corsproxy.io/?https://router.huggingface.co/hf-inference/models/cardiffnlp/twitter-roberta-base-sentiment-latest",
                {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + HF_TOKEN,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ inputs: text })
                })

            const data = await response.json()

            // correct parsing
            const results = data[0]

            let best = results.reduce((a, b) => a.score > b.score ? a : b)

            return best.label

        }

        function convertSignal(sentiment, score) {

            if (sentiment === "positive" && score > 0.75) return "Strong Buy"
            if (sentiment === "positive") return "Buy"

            if (sentiment === "negative" && score > 0.75) return "Strong Sell"
            if (sentiment === "negative") return "Sell"

            return "Hold"
        }

        function addRow(headline, sentiment, signal) {

            let cls = "hold"

            if (signal === "Buy") cls = "buy"
            if (signal === "Sell") cls = "sell"

            let tr = document.createElement("tr")

            tr.innerHTML = `
<td>${headline}</td>
<td>${sentiment}</td>
<td class="${cls}">${signal}</td>
`

            document.getElementById("tableBody").appendChild(tr)

        }

    </script>

</body>

</html>
